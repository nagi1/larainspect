server {
    listen 80 default_server;
    server_name _;
    root /var/www/html/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /index.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php-fpm.sock;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~ /\. {
        deny all;
    }

    location ~* \.(env|sql|bak|old|swp|git)$ {
        deny all;
    }

    location ^~ /storage/ {
        location ~ \.php$ {
            return 403;
        }
    }
}
