services:
  vulnerable:
    container_name: larainspect-demo-vulnerable
    hostname: vulnerable.demo
    build:
      context: ..
      dockerfile: demo/docker/vulnerable/Dockerfile
    ports:
      - "8081:80"
      - "9000:9000"
      - "9001:9001"

  normal:
    container_name: larainspect-demo-normal
    hostname: normal.demo
    build:
      context: ..
      dockerfile: demo/docker/normal/Dockerfile
    ports:
      - "8082:80"
